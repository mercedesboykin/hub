<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAP Hub · Mercedes Boykin-Sabalones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --green: #00a86b;
      --green-dim: rgba(0,168,107,.10);
      --green-glow: rgba(0,168,107,.30);
      --red: #dc2626;
      --amber: #d97706;
      --blue: #2563eb;
      --text: #0f172a;
      --muted: #64748b;
      --card: #f1f5f9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 32px; display: flex; align-items: center; gap: 16px;
    }
    .back-btn {
      width: 32px; height: 32px; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      text-decoration: none; color: var(--muted); font-size: 16px;
      transition: all .15s;
    }
    .back-btn:hover { border-color: var(--green); color: var(--green); }
    .hbreadcrumb { font-size: 12px; color: var(--muted); }
    .hbreadcrumb a { color: var(--muted); text-decoration: none; }
    .hbreadcrumb a:hover { color: var(--green); }
    .htitle { font-size: 16px; font-weight: 800; margin-left: auto; }
    .last-refreshed { font-size: 11px; color: var(--muted); }

    main { max-width: 1100px; margin: 0 auto; padding: 36px 32px; }

    /* Stats bar */
    .stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px;
    }
    .stat-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
    .stat-val { font-size: 28px; font-weight: 800; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .stat-green { color: var(--green); }
    .stat-amber { color: var(--amber); }

    /* Quarter tabs */
    .q-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
    .q-tab {
      padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      cursor: pointer; transition: all .15s;
    }
    .q-tab:hover { border-color: var(--green-glow); color: var(--text); }
    .q-tab.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
    .q-spacer { flex: 1; }
    .q-label { font-size: 12px; color: var(--muted); }

    /* Table */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--surface); }
    thead th {
      padding: 13px 16px; text-align: left; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(0,0,0,.03); }
    td { padding: 14px 16px; vertical-align: middle; }

    .deal-name { font-weight: 700; font-size: 14px; }
    .deal-industry { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .deal-type {
      font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .05em; white-space: nowrap;
    }
    .type-b2b { background: rgba(37,99,235,.10); color: #2563eb; }
    .type-d2c { background: rgba(124,58,237,.10); color: #7c3aed; }
    .type-both { background: rgba(217,119,6,.12); color: #d97706; }

    .close-date { font-size: 13px; font-weight: 500; white-space: nowrap; }
    .close-soon { color: var(--amber); }
    .close-overdue { color: var(--red); }

    .stage-pill {
      font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 6px;
      white-space: nowrap;
    }
    .stage-3 { background: rgba(245,158,11,.12); color: var(--amber); }
    .stage-4 { background: rgba(37,99,235,.10); color: #2563eb; }
    .stage-5 { background: rgba(0,168,107,.12); color: var(--green); }
    .stage-lost { background: rgba(100,116,139,.10); color: var(--muted); text-decoration: line-through; }

    .person { font-size: 12px; }
    .person-name { font-weight: 500; }
    .person-title { color: var(--muted); font-size: 11px; }

    .progress-wrap { min-width: 90px; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .3s; }
    .progress-label { font-size: 11px; color: var(--muted); }

    .next-step { font-size: 12px; color: var(--text); max-width: 160px; line-height: 1.4; }

    .btn-row { display: flex; flex-direction: column; gap: 5px; }
    .map-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 6px;
      text-decoration: none; white-space: nowrap; transition: all .15s;
    }
    .btn-map { background: var(--green-dim); border: 1px solid var(--green-glow); color: var(--green); }
    .btn-map:hover { background: rgba(0,168,107,.2); border-color: var(--green); }
    .btn-prop { background: rgba(37,99,235,.08); border: 1px solid rgba(37,99,235,.20); color: #2563eb; }
    .btn-prop:hover { background: rgba(37,99,235,.15); border-color: #2563eb; }
    .btn-tbd { background: var(--card); border: 1px solid var(--border); color: var(--muted); cursor: default; opacity: .5; }
    .btn-sf { background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.18); color: #6366f1; }
    .btn-sf:hover { background: rgba(99,102,241,.15); border-color: #6366f1; }

    .empty-row td { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }

    .table-wrap { overflow-x: auto; }

    .editable-num {
      display: inline-block; min-width: 28px; text-align: center;
      font-size: 13px; font-weight: 600; cursor: text;
      border-radius: 4px; padding: 2px 6px;
      transition: background .15s; outline: none;
    }
    .editable-num:hover { background: rgba(0,0,0,.04); }
    .editable-num:focus { background: rgba(0,0,0,.06); outline: 1px solid var(--border); }
    .editable-num-sub { font-size: 10px; color: var(--muted); text-align: center; }

    .pbr-val { font-size: 13px; font-weight: 700; color: var(--green); }
    .pbr-empty { font-size: 12px; color: var(--muted); font-style: italic; }

    footer { text-align: center; padding: 24px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 32px; }
  </style>
</head>
<body>

<header>
  <a href="../" class="back-btn">←</a>
  <span class="hbreadcrumb"><a href="../">Hub</a> / MAP Hub</span>
  <span class="htitle">🗺️ MAP Hub</span>
  <span class="last-refreshed" id="last-refreshed"></span>
</header>

<main>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- Quarter filter -->
  <div class="q-bar">
    <button class="q-tab" onclick="setQ('all')">All Deals</button>
    <button class="q-tab" onclick="setQ('Q1')">Q1 2026</button>
    <button class="q-tab active" onclick="setQ('Q2')">Q2 2026</button>
    <button class="q-tab" onclick="setQ('Q3')">Q3 2026</button>
    <button class="q-tab" onclick="setQ('Q4')">Q4 2026</button>
    <div class="q-spacer"></div>
    <span class="q-label" id="q-count"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Company</th>
          <th>Type</th>
          <th>Close Date</th>
          <th>Days Active</th>
          <th>Stage</th>
          <th>SE</th>
          <th>PBR</th>
          <th>MAP Progress</th>
          <th>Next Step</th>
          <th>Links</th>
        </tr>
      </thead>
      <tbody id="deal-tbody"></tbody>
    </table>
  </div>

</main>

<footer>Mercedes Boykin-Sabalones · Shopify B2B · Internal use only</footer>

<script>
  // ──────────────────────────────────────────────────────────────────
  //  DEALS DATA — sourced live from shopify-dw.sales.sales_opportunities
  //  stage: 2=Pre-Qualified 3=Envision 4=Solution 5=Demonstrate 6=Closed Won
  // ──────────────────────────────────────────────────────────────────
  // pbr = Projected Billed Revenue from Salesforce (Projected_Billed_Revenue__c)
  // meetings = count from Fellow meeting notes (as of 2026-04-08)
  const SF_REFRESHED = 'May 12, 2026';
  // emails = editable (Gmail MCP auth unavailable; fill manually)
  const DEALS = [
    { id: 'national-gym-supply', name: 'National Gym Supply', industry: 'Fitness Equipment Wholesale', stage: 2, close: '2026-06-30', quarter: 'Q2', pbr: 0, se: null, type: 'b2b', map_url: 'https://national-gym-supply-shopify.quick.shopify.io/', proposal_url: '', sf_url: 'https://banff.lightning.force.com/lightning/r/Opportunity/006OG00000NT4vpYAD/view', created: '2026-05-01', meetings: 1, map_progress: { done: 0, total: 0 }, next_step: 'Tech session May 16 — assign SE before call' },
    { id: 'allen-company', name: 'Allen Company', industry: 'Outdoor Sporting Goods · Louisville CO', stage: 2, close: '2026-08-31', quarter: 'Q3', pbr: 115755, se: null, type: 'both', map_url: '', proposal_url: '', sf_url: 'https://banff.lightning.force.com/lightning/r/Opportunity/006OG00000NISAHYA5/view', created: '2026-04-30', meetings: 1, map_progress: { done: 0, total: 0 }, next_step: 'Send Plus vs Advanced materials by Mon May 11' },
    { id: 'caravela-coffee', name: 'Caravela Coffee', industry: 'B2B Coffee Wholesale · London UK', stage: 3, close: '2026-09-30', quarter: 'Q3', pbr: 110882, se: null, type: 'b2b', map_url: '', proposal_url: '', sf_url: 'https://banff.lightning.force.com/lightning/r/Opportunity/006OG00000N1TdpYAF/view', created: '2026-04-15', meetings: 1, map_progress: { done: 0, total: 0 }, next_step: 'Technical deep dive — IT Director joining' },
    { id: 'artificial-turf-supply', name: 'Artificial Turf Supply', industry: 'Turf & Landscaping', stage: 3, close: '2026-10-30', quarter: 'Q4', pbr: 165689, se: 'Jordan Murphy', type: 'b2b', map_url: '', proposal_url: '', sf_url: 'https://banff.lightning.force.com/lightning/r/Opportunity/006OG00000MmGc7YAF/view', created: '2026-03-01', meetings: 2, map_progress: { done: 0, total: 0 }, next_step: 'Next meeting 1st week of July — surface EB' },
  ];

  const STAGE_LABELS = { 2:'Pre-Qualified', 3:'Envision', 4:'Solution', 5:'Demonstrate', 6:'Closed Won', 7:'Closed Lost' };
  const STAGE_CLASS  = { 2:'stage-3', 3:'stage-3', 4:'stage-4', 5:'stage-5', 6:'stage-5', 7:'stage-lost' };

  // ── Editable overrides stored in localStorage ──
  const OV_KEY = 'hub-map-overrides';
  let overrides = {};
  try { overrides = JSON.parse(localStorage.getItem(OV_KEY) || '{}'); } catch(e) {}
  function getOv(id, field, def) {
    return (overrides[id] && overrides[id][field] !== undefined) ? overrides[id][field] : def;
  }
  function setOv(id, field, val) {
    if (!overrides[id]) overrides[id] = {};
    overrides[id][field] = val;
    localStorage.setItem(OV_KEY, JSON.stringify(overrides));
  }
  window.saveNum = (id, field, el) => {
    const raw = el.innerText.replace(/[^0-9]/g,'').trim();
    const val = parseInt(raw) || 0;
    el.innerText = val;
    setOv(id, field, val);
    if (field === 'pbr') renderStats();
  };
  window.savePbr = (id, el) => {
    const raw = el.innerText.replace(/[^0-9.]/g,'').trim();
    const val = parseFloat(raw) || 0;
    el.innerText = val > 0 ? fmtMoney(val) : '—';
    setOv(id, 'pbr', val);
    renderStats();
  };

  function fmtMoney(n) {
    if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return '$' + (n/1000).toFixed(0) + 'k';
    return '$' + n.toLocaleString();
  }

  let currentQ = 'Q2';

  function setQ(q) {
    currentQ = q;
    document.querySelectorAll('.q-tab').forEach(t => {
      t.classList.toggle('active', t.textContent.includes(q) || (q === 'all' && t.textContent === 'All Deals'));
    });
    render();
  }

  function daysUntil(iso) {
    const d = new Date(iso);
    const now = new Date(); now.setHours(0,0,0,0);
    return Math.round((d - now) / 86400000);
  }

  function fmtDate(iso) {
    const [y,m,d] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[+m-1]} ${+d}, ${y}`;
  }

  function renderStats() {
    const active = DEALS.filter(d => d.stage < 6).length;
    const withMap = DEALS.filter(d => d.map_url && d.stage < 6).length;
    const closingThis = DEALS.filter(d => d.stage < 6 && d.close && daysUntil(d.close) >= 0 && daysUntil(d.close) <= 30).length;
    const wonQ = DEALS.filter(d => d.stage === 6 && d.quarter === currentQ).length;

    // PBR = sum of pbr overrides for Envision+ active deals in current quarter
    const pbrDeals = currentQ === 'all'
      ? DEALS.filter(d => d.stage >= 3 && d.stage < 7)
      : DEALS.filter(d => d.stage >= 3 && d.stage < 7 && d.quarter === currentQ);
    const pbrTotal = pbrDeals.reduce((sum, d) => sum + (getOv(d.id, 'pbr', d.pbr || 0) || 0), 0);
    const pbrLabel = pbrTotal > 0 ? fmtMoney(pbrTotal) : '—';
    const pbrSub = `${pbrDeals.length} deal${pbrDeals.length !== 1 ? 's' : ''} · Envision+`;

    document.getElementById('stats-bar').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Active Deals</div>
        <div class="stat-val stat-green">${active}</div>
        <div class="stat-sub">${DEALS.length} total in pipeline</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Have MAPs</div>
        <div class="stat-val stat-green">${withMap}</div>
        <div class="stat-sub">of ${active} active deals</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Closing ≤ 30 Days</div>
        <div class="stat-val stat-amber">${closingThis}</div>
        <div class="stat-sub">urgent action required</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Closed Won ${currentQ !== 'all' ? currentQ : 'YTD'}</div>
        <div class="stat-val">${wonQ}</div>
        <div class="stat-sub">deals this quarter</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">PBR Pipeline ${currentQ !== 'all' ? currentQ : 'All'}</div>
        <div class="stat-val stat-green">${pbrLabel}</div>
        <div class="stat-sub">${pbrSub}</div>
      </div>
    `;
  }

  function render() {
    renderStats();
    const deals = currentQ === 'all' ? DEALS : DEALS.filter(d => d.quarter === currentQ);
    document.getElementById('q-count').textContent = `${deals.length} deal${deals.length !== 1 ? 's' : ''}`;

    const tbody = document.getElementById('deal-tbody');
    if (deals.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="10">No deals in this quarter yet.</td></tr>';
      return;
    }

    tbody.innerHTML = deals.map(deal => {
      const typeLabel = { b2b:'B2B', d2c:'D2C', both:'B2B + D2C' }[deal.type];
      const typeClass = { b2b:'type-b2b', d2c:'type-d2c', both:'type-both' }[deal.type];
      const stageLabel = STAGE_LABELS[deal.stage] || `Stage ${deal.stage}`;
      const stageClass = STAGE_CLASS[deal.stage] || 'stage-3';
      const hasProg = deal.map_progress.total > 0;
      const pct = hasProg ? Math.round(deal.map_progress.done / deal.map_progress.total * 100) : 0;

      let closeTd;
      if (deal.close) {
        const days = daysUntil(deal.close);
        const dateClass = days < 0 ? 'close-overdue' : days <= 14 ? 'close-soon' : '';
        closeTd = `<span class="close-date ${dateClass}">${fmtDate(deal.close)}</span><br><span style="font-size:10px;color:var(--muted)">${days >= 0 ? `${days}d away` : `${Math.abs(days)}d ago`}</span>`;
      } else {
        closeTd = `<span style="color:var(--muted);font-size:12px">TBD</span>`;
      }

      const mapBtn = deal.map_url
        ? `<a href="${deal.map_url}" target="_blank" class="map-btn btn-map">🗺️ MAP</a>`
        : `<span class="map-btn btn-tbd">🗺️ MAP</span>`;
      const propBtn = deal.proposal_url
        ? `<a href="${deal.proposal_url}" target="_blank" class="map-btn btn-prop">📄 Proposal</a>`
        : `<span class="map-btn btn-tbd">📄 Proposal</span>`;
      const sfBtn = deal.sf_url
        ? `<a href="${deal.sf_url}" target="_blank" class="map-btn btn-sf">☁️ SFDC</a>`
        : '';

      const daysActive = deal.created ? Math.round((new Date() - new Date(deal.created)) / 86400000) : null;
      const meetings   = getOv(deal.id, 'meetings', deal.meetings || 0);
      const pbr        = getOv(deal.id, 'pbr', deal.pbr || 0);

      return `<tr>
        <td>
          <div class="deal-name">${deal.name}</div>
          <div class="deal-industry">${deal.industry}</div>
        </td>
        <td><span class="deal-type ${typeClass}">${typeLabel}</span></td>
        <td>${closeTd}</td>
        <td style="text-align:center">
          <div style="font-size:13px;font-weight:600">${daysActive !== null ? daysActive : '—'}</div>
          <div class="editable-num-sub">days</div>
        </td>
        <td><span class="stage-pill ${stageClass}">${stageLabel}</span></td>
        <td><div class="person"><div class="person-name">${deal.se || '—'}</div><div class="person-title">Solution Engineer</div></div></td>
        <td style="text-align:center">
          <div class="editable-num" contenteditable="true"
            onblur="savePbr('${deal.id}',this)"
            >${pbr > 0 ? fmtMoney(pbr) : '—'}</div>
        </td>
        <td>
          <div class="progress-wrap">
            ${hasProg
              ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                 <div class="progress-label">${deal.map_progress.done} / ${deal.map_progress.total} milestones</div>`
              : `<div class="progress-label" style="color:var(--muted)">No MAP yet</div>`
            }
          </div>
        </td>
        <td><div class="next-step">${deal.next_step || '—'}</div></td>
        <td><div class="btn-row">${mapBtn}${propBtn}${sfBtn}</div></td>
      </tr>`;
    }).join('');
  }

  const STAGE_STR_TO_NUM = {
    'Pre-Qualified': 2, 'Envision': 3, 'Solution': 4,
    'Demonstrate': 5, 'Closed Won': 6, 'Closed Lost': 7
  };

  function applyRemoteData(data) {
    if (!data || !data.deals) return;
    DEALS.forEach(d => {
      const r = data.deals[d.id];
      if (!r || !r.sf) return;
      if (r.sf.pbr !== undefined) { d.pbr = r.sf.pbr; setOv(d.id, 'pbr', r.sf.pbr); }
      if (r.sf.close) d.close = r.sf.close;
      if (r.sf.created) d.created = r.sf.created;
      if (r.sf.stage && STAGE_STR_TO_NUM[r.sf.stage]) d.stage = STAGE_STR_TO_NUM[r.sf.stage];
      // Update quarter based on new close date
      if (r.sf.close) {
        const m = new Date(r.sf.close).getMonth();
        d.quarter = m < 3 ? 'Q1' : m < 6 ? 'Q2' : m < 9 ? 'Q3' : 'Q4';
      }
    });
    if (data.updated) {
      const dt = new Date(data.updated);
      const fmt = dt.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
      const el = document.getElementById('last-refreshed');
      if (el) el.textContent = `SF refreshed ${fmt}`;
    }
  }

  // Set static SF refresh stamp; GitHub JSON may override with a precise timestamp
  const sfStampEl = document.getElementById('last-refreshed');
  if (sfStampEl) sfStampEl.textContent = `SF refreshed ${SF_REFRESHED}`;

  // Load immediately, then hydrate from GitHub
  render();
  (async () => {
    try {
      const res = await fetch('https://raw.githubusercontent.com/chasemccane/hub/main/deal-data.json?cb=' + Date.now());
      if (res.ok) {
        const data = await res.json();
        applyRemoteData(data);
        render();
      }
    } catch(e) {}
  })();
</script>
</body>
</html>
